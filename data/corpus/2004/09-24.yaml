date: 2004-09-24
source: "LJ post: https://rikchik.livejournal.com/5915.html"
color: Green
utterance:
    -
        author: Denis Moskowitz
        literal: Now is 6-Block 1, when windy blocks begin on human planet. I say "Happy windy blocks" to humans.
        loose: Today is 6-Block 1, the beginning of autumn on Earth. Happy autumn, humans!
        text: Me-I-Includes-0 Six-I-Quality-0 Number-N-Agentrec-1 One-I-Quality-0 Sun-N-Agent-1 Span-I-End-3 Span-I-Includes-0P Wind-N-Quality-0 Seven-N-Quality-0 Number-N-Agentrec-0 Span-I-Patient-3 Child-V-End-2 Human-R-Includesrec-0 Ground-N-Instrument-0 Globe-P-Includes-2 Child-V-End-1P Me-R-Source-0 Human-R-Destination-0P Happy-M-Quality-0 Wind-N-Quality-0 Seven-N-Quality-0 Number-N-Agentrec-0 Span-I-Patient-4 Talk-V-End-3
        note: The September equinox, marking the start of the autumn, was indeed around this time; in 2004, though, it took place on the 22nd, two days before this utterance was posted. There could have been a delay.
