        author: Denis Moskowitz
        literal: Four and seven days ago included a day during which I did chaos-work. I did a lot of chaos-work. I paid to do a lot of chaos work. Choose to read and play with me a lot or not. Two nights ago, I watched globes-with-fire-in-the-sky-that-bring-happiness, which made me happy.
        loose: "Eleven days ago, I spent a whole day playing. I played a lot. I paid to play a lot. Please read and play a lot with me. Two nights ago I looked at fireworks, which made me happy."
